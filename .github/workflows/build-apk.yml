name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🎨 Install icon generator
      run: npm install canvas --save-dev

    - name: 🔧 Install Capacitor CLI
      run: npm install -g @capacitor/cli

    - name: 🤖 Add Android platform (if not present)
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        fi

    - name: 🔄 Sync Capacitor
      run: npx cap sync android

    # ── FIX 1: Generate proper NassTec icon (replaces blue X) ──────────────────
    - name: 🎨 Generate NassTec app icon
      run: node scripts/generate-icon.js

    # ── FIX 2: Camera permissions ──────────────────────────────────────────────
    - name: 📷 Add camera permissions to AndroidManifest
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        # Add CAMERA permission if not already present
        if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.INTERNET"|' "$MANIFEST"
        fi
        # Ensure READ/WRITE storage for gallery pick
        if ! grep -q "READ_EXTERNAL_STORAGE" "$MANIFEST"; then
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.INTERNET"|' "$MANIFEST"
        fi
        # Declare camera feature
        if ! grep -q "android.hardware.camera" "$MANIFEST"; then
          sed -i 's|<uses-permission android:name="android.permission.CAMERA" />|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />|' "$MANIFEST"
        fi
        echo "✅ Permissions added:"
        grep -E "uses-permission|uses-feature" "$MANIFEST"

    # ── FIX 3: Enable Chrome/Chromium WebView for Arabic TTS ──────────────────
    - name: 🌐 Configure WebView for Chrome + Arabic TTS
      run: |
        # Patch build.gradle to add Chrome Custom Tabs support
        GRADLE="android/app/build.gradle"
        if ! grep -q "browser" "$GRADLE"; then
          sed -i "s|implementation platform('com.google.firebase:firebase-bom|// browser support added\n    implementation 'androidx.browser:browser:1.8.0'\n    implementation platform('com.google.firebase:firebase-bom|" "$GRADLE" || true
          # Fallback: append to dependencies block
          sed -i "/implementation fileTree/a\\    implementation 'androidx.browser:browser:1.8.0'" "$GRADLE" || true
        fi

        # Patch MainActivity to force Chrome WebView engine
        MAIN="android/app/src/main/java/com/nasstec/app/MainActivity.java"
        if [ -f "$MAIN" ]; then
          cat > "$MAIN" << 'JAVA'
package com.nasstec.app;

import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebSettings;
import android.content.pm.PackageManager;
import android.Manifest;
import androidx.core.app.ActivityCompat;
import androidx.core.content.ContextCompat;
import com.getcapacitor.BridgeActivity;

public class MainActivity extends BridgeActivity {

    private static final int CAMERA_PERMISSION_CODE = 1001;

    @Override
    public void onCreate(Bundle savedInstanceState) {
        // Force Chrome/Chromium WebView for Arabic TTS support
        try {
            WebView.setWebContentsDebuggingEnabled(false);
        } catch (Exception e) { /* ignore */ }

        super.onCreate(savedInstanceState);

        // Request camera permission at launch
        requestCameraPermissionIfNeeded();
    }

    private void requestCameraPermissionIfNeeded() {
        if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA)
                != PackageManager.PERMISSION_GRANTED) {
            ActivityCompat.requestPermissions(
                this,
                new String[]{
                    Manifest.permission.CAMERA,
                    Manifest.permission.READ_EXTERNAL_STORAGE
                },
                CAMERA_PERMISSION_CODE
            );
        }
    }

    @Override
    public void onRequestPermissionsResult(int requestCode,
            String[] permissions, int[] grantResults) {
        super.onRequestPermissionsResult(requestCode, permissions, grantResults);
        if (requestCode == CAMERA_PERMISSION_CODE) {
            // Notify the web layer about camera permission result
            if (grantResults.length > 0
                    && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                getBridge().triggerJSEvent("cameraPermissionGranted", "window", "{}");
            } else {
                getBridge().triggerJSEvent("cameraPermissionDenied", "window", "{}");
            }
        }
    }
}
JAVA
          echo "✅ MainActivity patched with camera permissions + Chrome WebView"
        else
          echo "⚠️  MainActivity not found at expected path, skipping Java patch"
          find android -name "MainActivity.java" 2>/dev/null
        fi

    - name: 🛠️ Make gradlew executable
      run: chmod +x android/gradlew

    - name: 🏗️ Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: 📤 Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: nasstec-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: 📋 APK Build Info
      run: |
        echo "✅ APK built successfully!"
        ls -lh android/app/build/outputs/apk/debug/
